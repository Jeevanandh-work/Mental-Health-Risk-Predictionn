name: CI and Azure Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Basic syntax check
        run: |
          python -m py_compile src/preprocess.py src/train.py api/main.py

      - name: Resolve dataset path
        id: dataset
        run: |
          if [ -f data/mental_health.csv ]; then
            echo "data_path=data/mental_health.csv" >> "$GITHUB_OUTPUT"
          elif [ -f Mental_Health_Lifestyle_Dataset.csv ]; then
            echo "data_path=Mental_Health_Lifestyle_Dataset.csv" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No dataset found. Add data/mental_health.csv or Mental_Health_Lifestyle_Dataset.csv"
            exit 1
          fi

      - name: Train model for deployment
        run: |
          python -m src.train \
            --data-path "${{ steps.dataset.outputs.data_path }}" \
            --output-dir model \
            --experiment-name mental-health-risk-prediction-ci

      - name: Verify model artifacts
        run: |
          test -f model/model.pkl
          test -f model/label_encoder.pkl
          test -f model/metrics.json

      - name: Archive project package
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: |
            api/
            src/
            model/
            requirements.txt
            Dockerfile
            README.md

  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: build-and-check
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
